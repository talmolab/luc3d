<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>mv-gui Test Suite</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #667eea; margin-bottom: 5px; }
        .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
        .test-summary {
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .test-summary.all-passed {
            background: rgba(72, 187, 120, 0.15);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
        }
        .test-summary.has-failures {
            background: rgba(245, 101, 101, 0.15);
            color: #f56565;
            border: 1px solid rgba(245, 101, 101, 0.3);
        }
        .test-suite {
            background: #16213e;
            border: 1px solid #2a2d5e;
            border-radius: 6px;
            padding: 12px 16px;
            margin-bottom: 12px;
        }
        .suite-title {
            font-size: 14px;
            margin: 0 0 8px 0;
        }
        .suite-passed { color: #48bb78; }
        .suite-failed { color: #f56565; }
        .test-case {
            font-size: 13px;
            padding: 2px 0;
        }
        .test-case.passed { color: #9ae6b4; }
        .test-case.failed { color: #feb2b2; }
        .test-error {
            color: #fc8181;
            font-size: 12px;
            padding: 4px 0 4px 28px;
            word-break: break-all;
        }
        #results { min-height: 100px; }
        .loading {
            color: #667eea;
            font-size: 14px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>mv-gui Test Suite</h1>
    <div class="subtitle">Browser-based tests for the multi-view pose proofreading GUI</div>
    <div id="results"><div class="loading">Running tests...</div></div>

    <!-- Test framework -->
    <script src="test-framework.js"></script>

    <!-- Three.js (needed for Viewport3D tests) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.147.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Test files -->
    <script src="test-pose-data.js"></script>
    <script src="test-triangulation.js"></script>
    <script src="test-file-io.js"></script>
    <script src="test-interaction.js"></script>
    <script src="test-regressions.js"></script>
    <script src="test-overlays.js"></script>
    <script src="test-integration.js"></script>

    <!-- Phase 5 test files -->
    <script src="test-video-mgmt.js"></script>
    <script src="test-view-mode.js"></script>
    <script src="test-instance-drag.js"></script>

    <!-- Phase 6 test files -->
    <script src="test-phase6.js"></script>

    <!-- Phase 7 test files -->
    <script src="test-phase7.js"></script>

    <!-- Timeline and video controller tests -->
    <script src="test-timeline.js"></script>
    <script src="test-timeline-bugs.js"></script>
    <script src="test-timeline-height.js"></script>
    <script src="test-grouped-track-dropdown.js"></script>
    <script src="test-video-controller.js"></script>
    <script src="test-multi-video.js"></script>

    <!-- Prompt 4 / Block 1 (Timeline visual updates):
         tree-grouped camera/track labels, scrollable track area, and
         Ctrl/Cmd+J toggle with prior-height cache. Pre-implementation
         these test files all FAIL — they assert APIs and DOM structure
         the Block 1 implementation must introduce. -->
    <script src="test-timeline-tree-grouping.js"></script>
    <script src="test-timeline-scroll.js"></script>
    <script src="test-timeline-toggle-shortcut.js"></script>

    <!-- Drag freeze regression tests -->
    <script src="test-drag-freeze.js"></script>

    <!-- Predicted group conversion tests -->
    <script src="test-predicted-conversion.js"></script>

    <!-- Save/load JSON roundtrip tests -->
    <script src="test-save-load-json.js"></script>

    <!-- Label rendering tests -->
    <script src="test-labels.js"></script>

    <!-- Assignment mode tests -->
    <script src="test-assignment.js"></script>

    <!-- Predicted double-click → user instance: selection transfer + multi-select preservation -->
    <script src="test-predicted-dblclick.js"></script>

    <!-- Ungroup / unlink-group regression tests (Bug A) -->
    <script src="test-ungroup-fix.js"></script>

    <!-- Group selection rules (Bug C + D) regression tests -->
    <script src="test-group-selection-rules.js"></script>

    <!-- Project loading and triangulation tests -->
    <script src="test-project-triangulation.js"></script>

    <!-- SLP merge tests -->
    <script src="test-slp-merge.js"></script>

    <!-- Tempdata triangulation pipeline tests -->
    <script src="test-tempdata-triangulation.js"></script>

    <!-- Multi-session export/import tests -->
    <script src="test-multi-session-export.js"></script>

    <!-- Reprojection lifecycle tests -->
    <script src="test-reprojection-lifecycle.js"></script>

    <!-- Predicted-visibility-on-load tests -->
    <script src="test-predicted-visibility-on-load.js"></script>

    <!-- Edit-group / per-view-delete fix regression tests -->
    <script src="test-edit-group-fixes.js"></script>

    <!-- Mixed-group predicted→user promotion (Session.unlinkGroup, createGroupFromUnlinked, Edit Group remove) -->
    <script src="test-mixed-group-promotion.js"></script>

    <!-- Per-view delete: size===1 auto-ungroup, full-group removal, mixed-group survivor promotion -->
    <script src="test-delete-auto-ungroup.js"></script>

    <!-- Cross-cutting integration: predicted dblclick + mixed group + per-view delete + Edit Group wasMixed snapshot -->
    <script src="test-mixed-group-integration.js"></script>

    <!-- Identity tests -->
    <script src="test-identity.js"></script>
    <script src="test-identity-none-label.js"></script>

    <!-- Session switching tests -->
    <script src="test-session-switching.js"></script>

    <!-- Bug B regression: frame index leaks across session switches -->
    <script src="test-session-switch-frame-reset.js"></script>

    <!-- Bug A regression: switchSource must await _initMp4box -->
    <script src="test-switchsource-mp4box-await.js"></script>

    <!-- QoL: switchSession parallel decoders + slot stability + early timeline.setData -->
    <script src="test-switchsession-parallel-decoders.js"></script>

    <!-- Per-decoder loading progress callback (feature: loading-progress-modal) -->
    <script src="test-decoder-onprogress.js"></script>
    <script src="test-switchsession-progress-wiring.js"></script>
    <script src="test-loading-progress-modal-api.js"></script>

    <!-- SLP project import progress modal feature (sequential sessions / parallel videos / two-level hierarchy) -->
    <script src="test-slp-import-sequential.js"></script>
    <script src="test-slp-import-parallel-videos.js"></script>
    <script src="test-slp-import-modal-structure.js"></script>
    <script src="test-decoder-pool-repeated-swap.js"></script>

    <!-- Tracker geometry tests -->
    <script src="test-tracker.js"></script>

    <!-- Bottom bar tests -->
    <script src="test-bottom-bar.js"></script>

    <!-- 2026-03-09 feature set: null-node graying, ungroup, reprojected null nodes, visibility deselect, per-view skeleton cache -->
    <script src="test-2026-03-09-changes.js"></script>

    <!-- Quick save tests -->
    <script src="test-quick-save.js"></script>

    <!-- Rotation tests -->
    <script src="test-rotation.js"></script>

    <!-- Pass 2 transitional bridge + test runner.
         Loads ESM-converted modules (pose/, ui/) and exposes their exports on
         window so the test files (loaded as classic scripts above) can find
         Skeleton, Camera, Instance, getTrackColor, triangulatePointDLT, etc.
         as globals when their describe/it callbacks run. The bridge MUST run
         before TestFramework.runAll() is invoked — using a single module here
         (deferred) guarantees that ordering. -->
    <script type="module">
        import * as __PoseData from '../pose/pose-data.js';
        import * as __Triangulation from '../pose/triangulation.js';
        import * as __Overlays from '../ui/overlays.js';
        import * as __Viewport3D from '../ui/viewport3d.js';
        import * as __Timeline from '../ui/timeline.js';
        import * as __Interaction from '../ui/interaction.js';
        import * as __SlpMerge from '../import-export/slp-merge.js';
        import * as __FileIO from '../import-export/file-io.js';
        import * as __Video from '../loading/video.js';
        import * as __LoadingProgressModal from '../ui/loading-progress-modal.js';
        // Block 1 (Prompt 4): the timeline toggle / fit-to-data / shortcut
        // helpers live in `ui/timeline-controller.js`. The module only
        // imports `ui/app-state.js` (no transitive app.js dependency), so
        // it's safe to bridge into the test runner.
        import * as __TimelineCtrl from '../ui/timeline-controller.js';
        Object.assign(window, __PoseData, __Triangulation, __Overlays,
                              __Viewport3D, __Timeline, __Interaction,
                              __SlpMerge, __FileIO, __Video,
                              __LoadingProgressModal,
                              __TimelineCtrl);
        // Note: ui/ui-wiring.js, ui/identity-assignment.js, and ui/export-modals.js
        // are intentionally NOT bridged here. All three transitively import app.js
        // (circular, awaiting later passes), and app.js requires the full DOM +
        // main page environment to load. The ui-fixes tests that exercise
        // edit-group / mixed-group / track-assign behavior mirror the production
        // logic in local test fixtures (e.g., finishEditGroupBranch,
        // editGroupRemoveBranch) rather than calling the production functions,
        // so no bridge is needed.

        try {
            const results = await TestFramework.runAll();
            // Modal-API tests construct LoadingProgressModal directly and call
            // show() without always calling dismiss() (each test asserts state
            // mid-lifecycle). Once the run is over, sweep any orphaned modal
            // elements so the test page isn't visually cluttered by them.
            document.querySelectorAll('.lucid-loading-progress-modal').forEach(el => el.remove());
            TestFramework.renderResults(results, document.getElementById('results'));

            // Also log to console for headless/CI use
            console.log('Test results:', results.passed + '/' + results.total + ' passed');
            if (results.failed > 0) {
                console.error(results.failed + ' test(s) failed:');
                for (const suite of results.suites) {
                    for (const test of suite.tests) {
                        if (test.status === 'failed') {
                            console.error('  FAIL: ' + suite.name + ' > ' + test.name + ': ' + test.error);
                        }
                    }
                }
            }
        } catch (err) {
            document.getElementById('results').textContent = 'Error running tests: ' + err.message;
            console.error('Test runner error:', err);
        }
    </script>
</body>
</html>
