site_name: LUC3D
site_description: Label Unification and Correspondence in 3D — Multi-view pose annotation GUI
site_url: https://talmolab.github.io/luc3d
repo_url: https://github.com/talmolab/luc3d
repo_name: talmolab/luc3d

dev_addr: 0.0.0.0:9907

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - content.code.copy
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - User Guide:
    - Multi-Camera Setup: user-guide/camera-setup.md
    - Annotation Workflow: user-guide/annotation.md
    - Tracks & Identities: user-guide/tracks-identities.md
    - 3D Triangulation: user-guide/triangulation.md
    - Exporting Data: user-guide/export.md
    - Keyboard Shortcuts: user-guide/shortcuts.md
  - Tutorials:
    - Loading a Session: tutorials/loading-session.md
    - Loading Multiple Sessions: tutorials/loading-multi-session.md
    - Loading Videos & Linking Calibrations: tutorials/videos-and-calibrations.md
    - Annotating Poses: tutorials/annotating.md
    - Reprojection-Aided Labeling: tutorials/reprojection-aided-labeling.md
    - Proofreading Annotations: tutorials/proofreading.md
    - 3D Reconstruction: tutorials/3d-reconstruction.md
  - Changelog: changelog.md
